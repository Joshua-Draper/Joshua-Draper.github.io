<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Draper | Technical Portfolio</title>
    <link rel="stylesheet" href="global.css">
    <style>
        /* Home Page Layout Grid */
        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            align-items: center;
            margin-top: 40px;
        }

        .hero-text {
            text-align: left;
        }

        .hero-tagline {
            display: inline-block;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-subtitle {
            font-size: 20px;
            color: #475569;
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* Modernized Interactive Action Button */
        .resume-action {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 40px;
        }

        .resume-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 35px -5px rgba(79, 70, 229, 0.5);
        }

        .welcome-badge {
            font-size: 15px;
            color: #64748b;
            font-weight: 500;
            border-top: 1px solid #e2e8f0;
            padding-top: 24px;
            display: block;
        }

        /* Redesigned Image Frame Container */
        .hero-image-area {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-frame {
            width: 100%;
            max-width: 380px;
            height: 380px;
            background: url('Images/SeniorPic.jpg') no-repeat center center;
            background-size: cover;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
            position: relative;
        }

        /* Subtle modern styling accent overlay */
        .image-frame::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            border-radius: 36px;
            z-index: -1;
            opacity: 0.7;
        }

        /* Responsive Mobile Optimization */
        @media (max-width: 900px) {
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 48px;
            }
            .hero-text {
                text-align: center;
                order: 2;
            }
            .hero-image-area {
                order: 1;
            }
            .image-frame {
                width: 280px;
                height: 280px;
                border-radius: 24px;
            }
            .image-frame::before {
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="topnav">
        <a href="index.html" class="active">Home</a>
        <a href="INF286IFPabout.html">About</a>
        <a href="INF286IFPeducation.html">Education</a>
        <a href="INF286IFPprojects.html">Projects</a>
        <a href="INF286IFPhobbies.html">Hobbies</a>
        <a href="INF286IFPcontact.html">Contact</a>
    </div>

    <div class="container">
        <div class="hero-grid">
            
            <div class="hero-text">
                <span class="hero-tagline">Systems & Security Portfolio</span>
                <h1>Hello, My Name Is Joshua Draper!</h1>
                <p class="hero-subtitle">I am a Junior student at Northern Kentucky University majoring in Computer Information Technology.</p>
                
                <a href="Joshua%20Draper%20Resume.pdf" target="_blank" class="resume-action">
                    📄 View Professional Resume
                </a>
                
                <span class="welcome-badge">Thank you 👋 for visiting my portfolio website!</span>
            </div>
            
            <div class="hero-image-area">
                <div class="image-frame"></div>
            </div>

        </div>
    </div>

</body>
</html>
